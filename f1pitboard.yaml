esphome:
  name: "f1pitboard"
  on_boot:
      priority: 200.0
      then:
        - component.update: eink_display
        - wait_until:
            condition:
              lambda: 'return id(data_updated) == true;'
        - delay: 5s
        - logger.log: "Initial sensor data received: Refreshing display..."
        - lambda: 'id(initial_data_received) = true;'
        - script.execute: update_screen_f1pitboard

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "[YOUR_KEY]"

ota:
  - platform: esphome
    password: "[YOUR_PASSWORD]"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: [YOUR _IP_ADDRESS]

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "F1Pitboard Fallback Hotspot"
    password: "[YOUR_PASSWORD]"

#bluetooth_proxy:

# Creates buttons in Home Assistant to
button:
  - platform: shutdown
    name: "F1 Pit Board - Shutdown"
  - platform: restart
    name: "F1 Pit Board - Restart"
  - platform: template
    name: "F1 Pit Board - Refresh Screen"
    entity_category: config
    on_press:
      - script.execute: update_screen_f1pitboard
      
      
# Global variables for detecting if the display needs to be refreshed. (Thanks @paviro!)
globals:
  - id: data_updated
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: initial_data_received
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: recorded_display_refresh
    type: int
    restore_value: yes
    initial_value: '0'


# Script for updating screen - Refresh display and publish refresh count and time. (Thanks @paviro!)
script:
  - id: update_screen_f1pitboard
    then:
      - lambda: 'id(data_updated) = false;'
      - component.update: eink_display
      - lambda: 'id(recorded_display_refresh) += 1;'
      - lambda: 'id(display_last_update).publish_state(id(homeassistant_time).now().timestamp);'
      

# Check whether the display needs to be refreshed every minute,
# based on whether new data is received or motion is detected. (Thanks @paviro!)
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - if:
              condition:
                lambda: 'return id(data_updated) == true;'
              then:
                - if:
                    condition:
                      binary_sensor.is_on: motion_detected
                    then:
                      - logger.log: "Sensor data updated and activity in home detected: Refreshing display..."
                      - script.execute: update_screen_f1pitboard
                    else:
                      - logger.log: "Sensor data updated but no activity in home - skipping display refresh."
              else:
                - logger.log: "No sensors updated - skipping display refresh."



