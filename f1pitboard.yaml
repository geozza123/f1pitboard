# Additions for Race Control
  - platform: homeassistant
    entity_id: sensor.f1_race_control
    id: race_control_msg
    attribute: history
    on_value:
      then:
        - lambda: |-
            // Only trigger a physical refresh if we actually intend to show the spoiler
            if (id(f1_spoiler_status).state == "Allowed") {
              id(eink_display).update(); 
            } else {
              // If spoilers are OFF, we just save the data silently 
              // and don't flicker the screen.
              ESP_LOGD("custom", "Spoiler suppressed. Not refreshing screen.");
            }

  - platform: homeassistant
    entity_id: sensor.f1_session_status
    id: f1_session_status_state
    on_value:
      then:
        - lambda: 'id(data_updated) = true;'

  - platform: homeassistant
    entity_id: input_select.f1_spoilers
    id: f1_spoiler_status
    on_value:
      then:
        - lambda: 'id(data_updated) = true;'

  - platform: homeassistant
    entity_id: sensor.f1_current_session
    id: f1_current_session
    on_value:
      then:
        - lambda: 'id(data_updated) = true;'
        


# Pins for Waveshare ePaper ESP Board
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO14


# Now render everything on the ePaper screen.
display:
  - platform: waveshare_epaper
    id: eink_display
    cs_pin: GPIO15
    dc_pin: GPIO27
    busy_pin:
      number: GPIO25
      inverted: true 
    reset_pin: GPIO26
    reset_duration: 2ms
    model: 7.50inV2alt
    update_interval: never
    rotation: 90°
    lambda: |-
      // 1. Generate timestamp footer
      auto draw_timestamp = [&](display::Display &it) {
        char str[17];
        time_t currTime = id(homeassistant_time).now().timestamp;
        strftime(str, sizeof(str), "%d %b %H:%M", localtime(&currTime));
        it.printf(240, 718, id(font_small_book), TextAlign::TOP_CENTER, "Updated: %s", str);
      };

      // 2. SPLASH SCREEN
      if (id(initial_data_received) == false) {
        it.image(165, 200, id(image_f1));
        it.printf(240, 350, id(font_small_bold), TextAlign::TOP_CENTER, "AND IT'S GO! GO! GO!");

        draw_timestamp(it);
      }

      // 3. RACE CONTROL MESSAGES
      else if (
          (id(f1_session_status_state).state == "pre"
          || id(f1_session_status_state).state == "live"
          || id(f1_session_status_state).state == "suspended"
          || id(f1_session_status_state).state == "break"
          || id(f1_session_status_state).state == "finished") && 
          id(f1_spoiler_status).state == "Allowed"
        ) {

        it.image(165, 80, id(image_f1));
        it.printf(240, 140, id(font_title_small), TextAlign::TOP_CENTER, "RACE CONTROL");
        it.printf(240, 180, id(font_title_wide), TextAlign::TOP_CENTER, id(f1_current_session).state.c_str());
        
        it.rectangle(20, 210, 440, 500); 

        std::string raw_json = id(race_control_msg).state;
        int y_pos = 240; 
        int total_lines_drawn = 0;
        size_t pos = 0;

        while ((pos = raw_json.find("message", pos)) != std::string::npos && total_lines_drawn < 14) {
            std::string time_str = "00:00";
            size_t time_pos = raw_json.rfind("utc", pos);
            if (time_pos != std::string::npos) {
                size_t t_start = raw_json.find("T", time_pos) + 1;
                time_str = raw_json.substr(t_start, 5);
            }

            size_t start = raw_json.find(":", pos);
            if (start == std::string::npos) break;
            start = raw_json.find_first_not_of(": '\"", start + 1);
            size_t end = raw_json.find_first_of("'\"", start);
            if (end == std::string::npos) break;
            std::string msg = raw_json.substr(start, end - start);
            
            std::string msg_upper = msg;
            for(auto & c: msg_upper) c = toupper(c);

            // --- BLUE FLAG FILTER START ---
            if (msg_upper.find("BLUE FLAG") != std::string::npos) {
                pos = end + 1; // Move the pointer forward
                continue;      // Skip this message and go to the next iteration
            }
            // --- BLUE FLAG FILTER END ---

            const char* glyph = "";
            if (msg_upper.find("PENALTY") != std::string::npos) glyph = "\U000F029B";
            else if (msg_upper.find("INVESTIGATION") != std::string::npos) glyph = "\U000F0349";
            else if (msg_upper.find("INCIDENT") != std::string::npos || msg_upper.find("REFERRED") != std::string::npos) glyph = "\U000F0026";

            it.printf(30, y_pos, id(font_small_bold), TextAlign::TOP_LEFT, "%s", time_str.c_str());
            if (strlen(glyph) > 0) it.printf(45, y_pos + 25, id(font_icon), TextAlign::TOP_CENTER, "%s", glyph);

            int max_chars = 25; 
            std::string remaining_msg = msg;
            while (remaining_msg.length() > 0 && total_lines_drawn < 14) {
                std::string line;
                if (remaining_msg.length() <= max_chars) { line = remaining_msg; remaining_msg = ""; }
                else {
                    size_t cut = remaining_msg.find_last_of(' ', max_chars);
                    if (cut == std::string::npos || cut == 0) cut = max_chars;
                    line = remaining_msg.substr(0, cut);
                    remaining_msg = remaining_msg.substr(cut + 1);
                }
                it.printf(115, y_pos, id(font_small_bold), TextAlign::TOP_LEFT, "%s", line.c_str());
                y_pos += 28; 
                total_lines_drawn++;
            }
            y_pos += 12; 
            pos = end + 1; 
        }

        draw_timestamp(it);
      } 

      // 4. STANDARD NEXT RACE INFO SCREEN
      else {
        it.image(60, 140, id(image_f1));
        it.printf(330, 120, id(font_title), TextAlign::TOP_CENTER, "%s", id(next_race_day_days_countdown).state.c_str());
        it.printf(260, 200, id(font_medium_bold), TextAlign::TOP_LEFT, "days until");
        it.printf(50, 250, id(font_title_small), TextAlign::TOP_LEFT, "%s", id(next_race_GP).state.c_str());
        it.printf(50, 290, id(font_medium_bold), TextAlign::TOP_LEFT, "%s", id(next_race_day_and_time).state.c_str());
        it.printf(50, 330, id(font_small_bold), TextAlign::TOP_LEFT, "%s", id(next_race_circuit).state.c_str());
        it.printf(50, 355, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(next_race_location).state.c_str());

        if (atoi(id(next_race_day_days_countdown).state.c_str()) < 4) {
          it.printf(50, 400, id(font_small_bold), TextAlign::TOP_LEFT, "%s", id(next_race_quali_and_time).state.c_str());
          it.printf(50, 430, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(next_race_fp1_and_time).state.c_str());
          if (id(next_race_sprint_quali_and_time).state == "" && id(next_race_sprint_and_time).state == "") {
            it.printf(50, 460, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(next_race_fp2_and_time).state.c_str());
            it.printf(50, 490, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(next_race_fp3_and_time).state.c_str());
          } else {
            it.printf(50, 460, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(next_race_sprint_quali_and_time).state.c_str());
            it.printf(50, 490, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(next_race_sprint_and_time).state.c_str());
          }
        }

        int lineWidth = 410;
        int xPos = (480 - lineWidth) / 2;
        it.rectangle(xPos, 535, lineWidth, 1);               
        it.printf(50, 560, id(font_small_bold), TextAlign::TOP_LEFT, "Next race:");
        it.printf(50, 585, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(race_schedule_plus1).state.c_str());
        it.printf(50, 610, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(race_schedule_plus2).state.c_str());
        it.printf(50, 635, id(font_small_book), TextAlign::TOP_LEFT, "%s", id(race_schedule_plus3).state.c_str());

        draw_timestamp(it);
      }

captive_portal:
